<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plan de Comidas – Registro Clínico</title>

<!-- CLAVE para móvil -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
:root{
 --verde:#4CAF50;
 --gris:#f2f2f2;
 --rojo:#d32f2f;
 --azul:#607D8B;
}

body{
 font-family: system-ui, Arial;
 margin:0;
 background:var(--gris);
}

header{
 background:var(--verde);
 color:white;
 padding:14px;
 text-align:center;
 font-size:18px;
}

main{
 padding:10px;
 max-width:700px;
 margin:auto;
}

section{
 background:white;
 margin-bottom:12px;
 padding:12px;
 border-radius:10px;
}

.hidden{ display:none }

label{
 font-weight:600;
 display:block;
 margin-top:10px;
}

input, textarea, select{
 width:100%;
 padding:12px;
 margin-top:6px;
 font-size:16px;
 border-radius:8px;
 border:1px solid #ccc;
}

textarea{ min-height:70px }

button{
 width:100%;
 padding:14px;
 margin-top:12px;
 border:0;
 border-radius:10px;
 font-size:17px;
 cursor:pointer;
}

.save{ background:var(--verde); color:white }
.secondary{ background:var(--azul); color:white }
.danger{ background:var(--rojo); color:white }

.subbloque{
 background:#f9f9f9;
 padding:10px;
 border-radius:8px;
 margin-top:10px;
}

/* CALENDARIO TÁCTIL */
.calendario{
 display:grid;
 grid-template-columns:repeat(7,1fr);
 gap:6px;
 margin-top:10px;
}

.dia{
 padding:14px 0;
 text-align:center;
 border-radius:10px;
 font-weight:600;
}

.dia.gris{ background:#eee }
.dia.verde{ background:#c8e6c9 }
.dia.amarillo{ background:#fff9c4 }
.dia.rojo{ background:#ffcdd2 }

#mensaje{
 margin-top:10px;
 padding:12px;
 text-align:center;
 border-radius:8px;
 font-weight:600;
 display:none;
}

.ok{ background:#e8f5e9 }

/* MEJORAS SOLO CUANDO HAY PANTALLA GRANDE */
@media(min-width:768px){
 main{ padding:20px }
}
</style>
</head>

<body>
<header>🍽️ Plan de Comidas – Registro Clínico</header>
<main>

<section>
<label>Nuevo paciente</label>
<input id="nuevoPaciente">
<button class="save" onclick="crearPaciente()">Añadir paciente</button>

<label>Paciente activo</label>
<select id="pacienteSelect"></select>

<button class="secondary" onclick="exportarCifrado()">🔐 Exportar cifrado</button>

<label>📥 Importar paciente (sustituye datos)</label>
<input type="file" id="importInput" accept=".json">

<button class="danger" onclick="eliminarPaciente()">🗑️ Eliminar paciente</button>
</section>

<section id="resumen" class="hidden">
<h3>📅 Resumen mensual</h3>
<div class="calendario" id="calendario"></div>
</section>

<section id="formRegistro" class="hidden">
<label>Fecha</label>
<input type="date" id="fecha">

<label>Emoción</label>
<select id="emocion">
<option></option>
<option>😌 Calma</option><option>😊 Alegría</option><option>😋 Satisfacción</option>
<option>😴 Cansancio</option><option>😟 Ansiedad</option>
<option>😢 Tristeza</option><option>😖 Culpa</option>
<option>😠 Enfado</option><option>😨 Miedo</option>
</select>

<textarea id="desayuno" placeholder="Desayuno"></textarea>
<textarea id="almuerzo" placeholder="Almuerzo"></textarea>

<div class="subbloque">
<input id="comida_p1" placeholder="1º plato">
<input id="comida_p2" placeholder="2º plato">
<textarea id="comida_sobras" placeholder="Sobras comida"></textarea>
<label>Saciedad comida</label>
<select id="comida_saciedad">
<option></option><option value="hambre">Con hambre</option>
<option value="saciado">Saciado</option><option value="pasado">Se pasó</option>
</select>
</div>

<textarea id="merienda" placeholder="Merienda"></textarea>

<div class="subbloque">
<input id="cena_p1" placeholder="1º plato">
<input id="cena_p2" placeholder="2º plato">
<textarea id="cena_sobras" placeholder="Sobras cena"></textarea>
<label>Saciedad cena</label>
<select id="cena_saciedad">
<option></option><option value="hambre">Con hambre</option>
<option value="saciado">Saciado</option><option value="pasado">Se pasó</option>
</select>
</div>

<button class="save" id="btnGuardar">Guardar día</button>
<div id="mensaje"></div>
</section>

</main>

<script>
/* TODA LA LÓGICA ES EXACTAMENTE LA MISMA
   no se ha tocado nada funcional */
const $=id=>document.getElementById(id);
const keyPaciente=id=>`registros_paciente_${id}`;

   👉 que en el fichero anterior que aprobaste
   👉 SIN CAMBIAR UNA SOLA LÍNEA
*/

</script>
</body>
</html>
